name: nafiesna
description: "NafieSna - İslami içerik mobil uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation
  auto_route: ^9.2.2

  # Network

  # Local Storage

  # UI

  # Utilities
  intl: ^0.20.2
  json_annotation: ^4.9.0

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^28.2.7
  dio: ^5.9.2
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  chucker_flutter: ^1.9.1
  shared_preferences: ^2.5.4
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^18.0.1
  permission_handler: ^12.0.1
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  auto_route_generator: ^9.2.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/kaside_i_burde.pdf
    - assets/evrad_i_serif.pdf
