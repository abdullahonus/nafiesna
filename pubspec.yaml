name: nafiesna
description: "NafieSna - İslami içerik mobil uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation
  auto_route: ^9.2.2

  # Network

  # Local Storage

  # UI

  # Utilities
  intl: ^0.19.0
  json_annotation: ^4.9.0

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^27.1.48
  dio: ^5.9.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  auto_route_generator: ^9.2.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/kaside.pdf
